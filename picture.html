<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MangaPanel – Manga Mint</title>
  <link rel="stylesheet" href="picturestylesheet.css">
</head>
<body>

  <header class="header">
    <a href="#" class="logo">
      <!-- onerror fallback renders text logo if banner.png is missing -->
      <img src="banner.png" alt="Sketch Up Logo"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
      <span class="logo-text" style="display:none;">MANGA MINT</span>
    </a>

    <nav class="navbar">
      <a href="index.html">Home</a>
      <a href="start.html">Starting</a>
      <a href="video.html">Videos</a>
      <a href="picture.html">Pictures</a>
    </nav>
  </header>

  <div class="banner">

    <!-- 3D rotating card ring -->
    <div class="slider" style="--quantity: 10;">
      <div class="item" style="--position: 1;"> <img src="images/aot.jpg"          alt="Attack on Titan"></div>
      <div class="item" style="--position: 2;"> <img src="images/asta.jpg"         alt="Black Clover – Asta"></div>
      <div class="item" style="--position: 3;"> <img src="images/bleach.jpg"       alt="Bleach"></div>
      <div class="item" style="--position: 4;"> <img src="images/bluelock.jpg"     alt="Blue Lock"></div>
      <div class="item" style="--position: 5;"> <img src="images/chainsaw.jpg"     alt="Chainsaw Man"></div>
      <div class="item" style="--position: 6;"> <img src="images/devil.jpg"        alt="Devil"></div>
      <div class="item" style="--position: 7;"> <img src="images/gojo.jpg"         alt="Gojo"></div>
      <div class="item" style="--position: 8;"> <img src="images/Itadori Yuji.jpg" alt="Itadori Yuji"></div>
      <div class="item" style="--position: 9;"> <img src="images/kaiju.jpg"        alt="Kaiju No. 8"></div>
      <div class="item" style="--position: 10;"><img src="images/tanjiro.jpg"      alt="Tanjiro"></div>
    </div>
    <div class="content">

      <div class="author">
        <h2>MANGA MINT</h2>
        <p><b>anime sketching</b></p>
        <p>Learn Anime Sketching From Zero To Advance For Free!!</p>
      </div>
      <div class="model" role="presentation" aria-hidden="true"></div>
    </div>

  </div>

</body>
</html>
